# Battledance Chess training configuration
#
# If this file is absent, battledance_training.py uses its built-in canonical
# defaults. The values below intentionally preserve those canonical defaults,
# while exposing control knobs for alternate fresh runs.
#
# Important: structural changes should be made only before starting a fresh run.
# Do not change agents, snapshots, population shape, or evaluation counts mid-run.

[threads]
# --threads-mode is a string. If omitted on the command line, this named mode is used.
# If this default is also omitted, the script falls back to one worker in [agents] order.
default = 5
1 = ZyX, nyC, deR, Cyn, Red, XyZ, gaM, nrG, Mag, Grn, leY, ulB, NoN, Yel, Blu
3 = deR, Red, Mag, ulB, Blu | nyC, Cyn, gaM, leY, Yel | ZyX, XyZ, nrG, Grn, NoN
5 = Red, Grn, Blu | Cyn, Mag, Yel | ZyX, XyZ, NoN | deR, nrG, ulB | nyC, gaM, leY

[agents]
# If this is blank or omitted while the [agents] section exists, the script uses one Solo agent.
names = Red, Grn, Blu, Cyn, Mag, Yel, NoN, deR, nrG, ulB, nyC, gaM, leY, XyZ, ZyX

[opponents]
# If an agent is omitted here, that agent trains against all configured agents, including itself.
# Use "self" for only its own past snapshots, or "all_other" only if you explicitly want self excluded.
default = all
Red = NoN, Grn, ulB, Cyn, gaM, Yel, ZyX, Red
Grn = deR, NoN, Blu, Cyn, Mag, leY, ZyX, Grn
Blu = Red, nrG, NoN, nyC, Mag, Yel, ZyX, Blu
Cyn = deR, nrG, Blu, NoN, gaM, Yel, ZyX, Cyn
Mag = Red, nrG, ulB, Cyn, NoN, leY, ZyX, Mag
Yel = deR, Grn, ulB, nyC, Mag, NoN, ZyX, Yel
NoN = deR, nrG, ulB, nyC, gaM, leY, ZyX, NoN
deR = Red, nrG, Blu, nyC, Mag, leY, ZyX, deR
nrG = Red, Grn, ulB, nyC, gaM, Yel, ZyX, nrG
ulB = deR, Grn, Blu, Cyn, gaM, leY, ZyX, ulB
nyC = Red, Grn, ulB, Cyn, Mag, leY, ZyX, nyC
gaM = deR, Grn, Blu, nyC, Mag, Yel, ZyX, gaM
leY = Red, nrG, Blu, Cyn, gaM, Yel, ZyX, leY
XyZ = Red, Grn, Blu, Cyn, Mag, Yel, NoN, deR, nrG, ulB, nyC, gaM, leY, XyZ
ZyX = XyZ, ZyX

[snapshots]
# Non-_0 snapshots retained per agent. A value of 4 means _1.._4.
kept_nonzero_snapshots = 4
# Snapshots actually trained/evaluated against. Must be a subset of kept_nonzero_snapshots.
training_snapshots = 1, 2, 3, 4

[prelude]
rounds = 8
workers = 5
# Must contain exactly the same labels as [agents] names.
snake_order = ZyX, XyZ, deR, nyC, Red, Cyn, nrG, gaM, Grn, Mag, ulB, leY, Blu, Yel, NoN

[population]
# ((parents^2) x children) + elites; ((8^2)*4) + 4 = 260
parents = 8
children_per_parent_intersection = 4
elites = 4

[network]
# Input size and output size are fixed by the Battledance Chess feature encoding.
# This list controls hidden tanh layers only. Canonical default: three 512-wide layers.
hidden_layers = 512, 512, 512

[mutation]
# cycle:value pairs. 0:0.001953125 is 1/512.
rate_schedule = 0:0.001953125
weight_decay_schedule = 0:0.0
weight_noise_scale_multiplier = 0.25
bias_noise_scale = 0.03125

[evaluation]
stage1_rounds = 2
stage2_finalists = 12
stage2_rounds = 16
# 0 disables periodic worst-only fallback; 1024 preserves the canonical cadence.
worst_only_every_unsuccessful_generations = 1024

[cycle_rr]
reps = 64

[move_choice]
candidate_threshold = 0.8
terminal_win_score = 1000000
